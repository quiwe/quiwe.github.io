<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps 项目分类 - 毛球博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --accent-orange: #f97316;
            --accent-green: #22c55e;
            --border-color: #30363d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
        
        header { padding: 48px 0 32px; border-bottom: 1px solid var(--border-color); margin-bottom: 48px; }
        .profile { display: flex; align-items: center; gap: 24px; }
        .avatar-img {
            width: 64px; height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-purple);
        }
        .profile-info h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .profile-info p { color: var(--text-secondary); font-size: 13px; }
        
        nav { display: flex; gap: 32px; margin-bottom: 48px; flex-wrap: wrap; }
        nav a {
            color: var(--text-secondary); text-decoration: none; font-size: 15px;
            position: relative; padding: 8px 0; transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: var(--text-primary); }
        nav a.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
            border-radius: 2px;
        }
        
        section { margin-bottom: 48px; }
        section h2 {
            font-size: 20px; font-weight: 600; margin-bottom: 24px;
            display: flex; align-items: center; gap: 12px;
        }
        section h2::before {
            content: ''; width: 4px; height: 20px;
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 2px;
        }
        
        .category-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        .category-tag {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }
        .category-tag:hover, .category-tag.active {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }
        
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .project-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.15);
        }
        .project-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .project-card p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tech {
            padding: 2px 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent-orange);
            font-family: 'JetBrains Mono', monospace;
        }
        
        footer { padding: 32px 0; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-secondary); font-size: 13px; }
        
        @media (max-width: 640px) {
            .profile { flex-direction: column; text-align: center; }
            nav { justify-content: center; gap: 16px; }
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="profile">
                <a href="index.html"><img src="avatar.png" alt="毛球" class="avatar-img"></a>
                <div class="profile-info">
                    <h1><a href="index.html" style="color: inherit; text-decoration: none;">毛球</a></h1>
                    <p>技术爱好者 · 探索者</p>
                </div>
            </div>
        </header>
        
        <nav>
            <a href="index.html">首页</a>
            <a href="articles.html">文章</a>
            <a href="life-hacks.html">生活小妙招</a>
            <a href="photos.html">摄影</a>
            <a href="projects.html" class="active">项目</a>
            <a href="tools.html">工具箱</a>
            <a href="guestbook.html">留言板</a>
        </nav>
        
        <main>
            <section>
                <h2>🚀 DevOps 项目</h2>
                <div class="sort-bar">
                    <span class="sort-label">排序：</span>
                    <select id="projectSort" class="sort-select" onchange="sortProjects()">
                        <option value="latest">最新</option>
                        <option value="popular">最热</option>
                    </select>
                </div>
                <div class="category-nav">
                    <a href="projects.html" class="category-tag">全部</a>
                    <a href="projects-ai.html" class="category-tag">AI</a>
                    <a href="projects-tools.html" class="category-tag">工具</a>
                    <a href="projects-devops.html" class="category-tag active">DevOps</a>
                </div>
                <div class="project-grid">
                    <a href="project-deploy-tool.html" class="project-card" data-views="350">
                        <h3>自动化部署工具</h3>
                        <p>简化应用部署流程，实现一键部署到服务器或云平台，支持 Docker 和 Kubernetes</p>
                        <div class="tech-stack">
                            <span class="tech">Python</span>
                            <span class="tech">Docker</span>
                        </div>
                    </a>
                    <a href="project-openclaw.html" class="project-card" data-views="750">
                        <h3>OpenClaw 助手</h3>
                        <p>基于OpenClaw的AI助手，支持多平台接入</p>
                        <div class="tech-stack">
                            <span class="tech">Python</span>
                            <span class="tech">Node.js</span>
                        </div>
                    </a>
                </div>
            </section>
        </main>
        
        <footer>
            <p>© 2026 毛球的博客 · Built with ❤️</p>
        </footer>
    </div>
    
    <style>
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .sort-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .sort-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }
        .sort-select:hover {
            border-color: var(--accent-green);
        }
    </style>
    
    <script>
    function sortProjects() {
        const sortType = document.getElementById('projectSort').value;
        const sections = document.querySelectorAll('section');
        
        sections.forEach(section => {
            const grid = section.querySelector('.project-grid');
            if (!grid) return;
            
            const projects = Array.from(grid.querySelectorAll('.project-card'));
            
            projects.sort((a, b) => {
                if (sortType === 'latest') {
                    const dateA = new Date(a.dataset.date || '2026-01-01');
                    const dateB = new Date(b.dataset.date || '2026-01-01');
                    return dateB - dateA;
                } else if (sortType === 'popular') {
                    const viewsA = parseInt(a.dataset.views) || 0;
                    const viewsB = parseInt(b.dataset.views) || 0;
                    return viewsB - viewsA;
                }
            });
            
            projects.forEach(p => grid.appendChild(p));
        });
    }
    </script>
</body>
</html>
