<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影 - 毛球博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --accent-orange: #f97316;
            --border-color: #30363d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
        
        header { padding: 48px 0 32px; border-bottom: 1px solid var(--border-color); margin-bottom: 48px; }
        .profile { display: flex; align-items: center; gap: 24px; }
        .avatar-img {
            width: 64px; height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-purple);
        }
        .profile-info h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .profile-info p { color: var(--text-secondary); font-size: 13px; }
        
        nav { display: flex; gap: 32px; margin-bottom: 48px; }
        nav a {
            color: var(--text-secondary); text-decoration: none; font-size: 15px;
            position: relative; padding: 8px 0; transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: var(--text-primary); }
        nav a.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
            border-radius: 2px;
        }
        
        section { margin-bottom: 48px; }
        section h2 {
            font-size: 20px; font-weight: 600; margin-bottom: 24px;
            display: flex; align-items: center; gap: 12px;
        }
        section h2::before {
            content: ''; width: 4px; height: 20px;
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 2px;
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        .photo-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .photo-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.15);
        }
        .photo-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .photo-info { padding: 16px; }
        .photo-info h3 { font-size: 14px; margin-bottom: 4px; }
        .photo-info p { font-size: 12px; color: var(--text-secondary); }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon { font-size: 64px; margin-bottom: 16px; }
        
        footer { padding: 32px 0; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-secondary); font-size: 13px; }
        
        @media (max-width: 640px) {
            .profile { flex-direction: column; text-align: center; }
            nav { justify-content: center; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="profile">
                <a href="index.html"><img src="avatar.png" alt="毛球" class="avatar-img"></a>
                <div class="profile-info">
                    <h1><a href="index.html" style="color: inherit; text-decoration: none;">毛球</a></h1>
                    <p>技术爱好者 · 探索者</p>
                </div>
            </div>
        </header>
        
        <nav>
            <a href="index.html">首页</a>
            <a href="articles.html">文章</a>
            <a href="photos.html" class="active">摄影</a>
            <a href="projects.html">项目</a>
            <a href="tools.html">工具箱</a>
            <a href="guestbook.html">留言板</a>
        </nav>
        
        <main>
            <section>
                <h2>摄影作品</h2>
                <div class="photo-grid">
                    <div class="photo-card">
                        <div class="photo-placeholder">🌸</div>
                        <div class="photo-info">
                            <h3>春天</h3>
                            <p>2026-03</p>
                        </div>
                    </div>
                    <div class="photo-card">
                        <div class="photo-placeholder">🌅</div>
                        <div class="photo-info">
                            <h3>日落</h3>
                            <p>2026-02</p>
                        </div>
                    </div>
                    <div class="photo-card">
                        <div class="photo-placeholder">🏔️</div>
                        <div class="photo-info">
                            <h3>风景</h3>
                            <p>2026-01</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>© 2026 毛球的博客 · Built with ❤️</p>
        </footer>
    </div>
</body>
</html>
