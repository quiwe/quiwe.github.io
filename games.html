<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小游戏 - 毛球博客</title>
<style>
:root{--bg-primary:#0d1117;--bg-secondary:#161b22;--bg-tertiary:#21262d;--text-primary:#e6edf3;--text-secondary:#8b949e;--border-color:#30363d;--accent-purple:#a371f7;--accent-pink:#db61a2;--accent-cyan:#39c5cf;--accent-orange:#f0883e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:0 20px}
header{padding:32px 0;border-bottom:1px solid var(--border-color)}
.profile{display:flex;align-items:center;gap:16px}
.avatar-img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--accent-purple)}
.profile-info h1{font-size:24px;margin-bottom:4px}
.profile-info a{color:inherit;text-decoration:none}
.profile-info p{color:var(--text-secondary);font-size:14px}
nav{padding:16px 0;display:flex;gap:24px;border-bottom:1px solid var(--border-color);flex-wrap:wrap}
nav a{color:var(--text-secondary);text-decoration:none;font-size:15px}
nav a:hover,nav a.active{color:var(--accent-purple)}
main{padding:40px 0}
.page-title{font-size:32px;margin-bottom:32px;background:linear-gradient(135deg,var(--accent-purple),var(--accent-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.game-card{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;padding:24px;display:block;transition:all .2s;cursor:pointer}
.game-card:hover{border-color:var(--accent-cyan);transform:translateY(-4px)}
.game-card h2{font-size:20px;margin-bottom:12px;color:var(--accent-cyan)}
.game-card p{font-size:14px;color:var(--text-secondary)}
.game-icon{font-size:48px;margin-bottom:16px}
.game-area{margin-top:32px}
.game-container{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;padding:24px;margin-bottom:32px}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.game-title{font-size:24px;color:var(--accent-purple)}
.btn{padding:8px 16px;background:var(--accent-purple);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.gobang-board{display:grid;grid-template-columns:repeat(15,1fr);gap:1px;background:var(--border-color);border:2px solid var(--border-color);width:100%;max-width:450px;margin:0 auto}
.gobang-cell{aspect-ratio:1;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer}
.gobang-cell:hover{background:var(--bg-tertiary)}
.gobang-cell.black::after,.gobang-cell.white::after{content:'';width:80%;height:80%;border-radius:50%}
.gobang-cell.black::after{background:#000}
.gobang-cell.white::after{background:#fff}
.gobang-info{text-align:center;margin-top:16px;font-size:16px;color:var(--text-secondary)}
.gobang-info .current-player{color:var(--accent-cyan);font-weight:bold}
.game2048-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.game2048-scores{display:flex;gap:12px}
.game2048-score{background:var(--bg-tertiary);padding:8px 16px;border-radius:8px;text-align:center;min-width:70px}
.game2048-score-label{font-size:12px;color:var(--text-secondary)}
.game2048-score-value{font-size:20px;font-weight:bold;color:var(--accent-orange)}
.game2048-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--bg-tertiary);padding:8px;border-radius:8px;max-width:320px;margin:0 auto}
.game2048-cell{aspect-ratio:1;background:var(--bg-secondary);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold}
.game2048-cell[data-value="2"]{background:#eee4da;color:#776e65}
.game2048-cell[data-value="4"]{background:#ede0c8;color:#776e65}
.game2048-cell[data-value="8"]{background:#f2b179;color:#f9f6f2}
.game2048-cell[data-value="16"]{background:#f59563;color:#f9f6f2}
.game2048-cell[data-value="32"]{background:#f67c5f;color:#f9f6f2}
.game2048-cell[data-value="64"]{background:#f65e3b;color:#f9f6f2}
.game2048-cell[data-value="128"]{background:#edcf72;color:#f9f6f2;font-size:16px}
.game2048-cell[data-value="256"]{background:#edcc61;color:#f9f6f2;font-size:16px}
.game2048-cell[data-value="512"]{background:#edc850;color:#f9f6f2;font-size:16px}
.game2048-cell[data-value="1024"]{background:#edc53f;color:#f9f6f2;font-size:14px}
.game2048-cell[data-value="2048"]{background:#edc22e;color:#f9f6f2;font-size:14px}
.game2048-instructions{text-align:center;margin-top:16px;color:var(--text-secondary);font-size:14px}
footer{padding:32px 0;border-top:1px solid var(--border-color);text-align:center;color:var(--text-secondary);font-size:13px;margin-top:60px}
@media(max-width:640px){.profile{flex-direction:column;text-align:center}nav{justify-content:center;gap:12px}.page-title{font-size:24px}.games-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header><div class="profile"><a href="index.html"><img src="avatar.png" alt="毛球" class="avatar-img"></a><div class="profile-info"><h1><a href="index.html" style="color:inherit;text-decoration:none;">毛球</a></h1><p>技术爱好者 · 探索者</p></div></div></header>
<nav><a href="index.html">首页</a><a href="articles.html">文章</a><a href="photos.html">摄影</a><a href="projects.html">项目</a><a href="tools.html">工具箱</a><a href="games.html" class="active">小游戏</a><a href="guestbook.html">留言板</a></nav>
<main>
<h1 class="page-title">🎮 小游戏</h1>
<div class="games-grid"><div class="game-card" onclick="showGame('gobang')"><div class="game-icon">♟️</div><h2>五子棋</h2><p>经典的黑白棋游戏，和AI对战，看看谁能先连成五子！</p></div><div class="game-card" onclick="showGame('2048')"><div class="game-icon">🎲</div><h2>2048</h2><p>热门数字合成游戏，移动方块，合成2048！</p></div></div>
<div id="gobang" class="game-area"><div class="game-container"><div class="game-header"><h2 class="game-title">♟️ 五子棋</h2><button class="btn" onclick="initGobang()">重新开始</button></div><div class="gobang-board" id="gobang-board"></div><div class="gobang-info">当前执子：<span class="current-player" id="gobang-player">黑方</span></div></div></div>
<div id="game2048" class="game-area"><div class="game-container"><div class="game-header"><h2 class="game-title">🎲 2048</h2><div class="game2048-scores"><div class="game2048-score"><div class="game2048-score-label">分数</div><div class="game2048-score-value" id="score">0</div></div><div class="game2048-score"><div class="game2048-score-label">最高</div><div class="game2048-score-value" id="best-score">0</div></div></div></div><button class="btn" style="width:100%;margin-bottom:16px;" onclick="init2048()">新游戏</button><div class="game2048-grid" id="game2048-grid"></div><div class="game2048-instructions">使用方向键或WASD移动方块</div></div></div>
</main>
<footer><p>© 2026 毛球博客 · 由泡芙协助编写</p></footer>
</div>
<script>
var urlParams=new URLSearchParams(window.location.search),game=urlParams.get('game');if(game){showGame(game)}
function showGame(gameName){document.querySelectorAll('.game-area').forEach(function(el){el.classList.remove('active')});if(gameName==='gobang'){document.getElementById('gobang').classList.add('active');initGobang()}else if(gameName==='2048'){document.getElementById('game2048').classList.add('active');init2048()}}
var gobangBoard=[],currentPlayer='black';
function initGobang(){var board=document.getElementById('gobang-board');board.innerHTML='';gobangBoard=Array(15).fill(null).map(function(){return Array(15).fill(null)});currentPlayer='black';document.getElementById('gobang-player').textContent='黑方';for(var i=0;i<15;i++){for(var j=0;j<15;j++){var cell=document.createElement('div');cell.className='gobang-cell';cell.onclick=(function(r,c){return function(){playGobang(r,c)}})(i,j);board.appendChild(cell)}}}
function playGobang(row,col){if(gobangBoard[row][col])return;gobangBoard[row][col]=currentPlayer;var cells=document.querySelectorAll('.gobang-cell');cells[row*15+col].classList.add(currentPlayer);if(checkWin(row,col)){alert((currentPlayer==='black'?'黑方':'白方')+'获胜！');initGobang();return}currentPlayer=currentPlayer==='black'?'white':'black';document.getElementById('gobang-player').textContent=currentPlayer==='black'?'黑方':'白方'}
function checkWin(row,col){var directions=[[1,0],[0,1],[1,1],[1,-1]];for(var d=0;d<directions.length;d++){var dr=directions[d][0],dc=directions[d][1],count=1;for(var i=1;i<5;i++){var r=row+dr*i,c=col+dc*i;if(r>=0&&r<15&&c>=0&&c<15&&gobangBoard[r][c]===currentPlayer)count++;else break}for(var i=1;i<5;i++){var r=row-dr*i,c=col-dc*i;if(r>=0&&r<15&&c>=0&&c<15&&gobangBoard[r][c]===currentPlayer)count++;else break}if(count>=5)return true}return false}
var grid2048=[],score=0,bestScore=localStorage.getItem('2048-best')||0;
function init2048(){grid2048=Array(4).fill(null).map(function(){return Array(4).fill(0)});score=0;addRandomTile2048();addRandomTile2048();update2048Display();document.getElementById('best-score').textContent=bestScore;document.addEventListener('keydown',handleKey)}
function addRandomTile2048(){var empty=[];for(var r=0;r<4;r++){for(var c=0;c<4;c++){if(grid2048[r][c]===0)empty.push({r:r,c:c})}}if(empty.length>0){var tile=empty[Math.floor(Math.random()*empty.length)];grid2048[tile.r][tile.c]=Math.random()<0.9?2:4}}
function update2048Display(){var grid=document.getElementById('game2048-grid');grid.innerHTML='';for(var r=0;r<4;r++){for(var c=0;c<4;c++){var cell=document.createElement('div');cell.className='game2048-cell';var val=grid2048[r][c];if(val>0){cell.textContent=val;cell.setAttribute('data-value',val)}grid.appendChild(cell)}}document.getElementById('score').textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('2048-best',bestScore);document.getElementById('best-score').textContent=bestScore}}
function handleKey(e){if(!document.getElementById('game2048').classList.contains('active'))return;var key=e.key;if(key==='ArrowLeft'||key==='a'||key==='A')move2048('left');else if(key==='ArrowRight'||key==='d'||key==='D')move2048('right');else if(key==='ArrowUp'||key==='w'||key==='W')move2048('up');else if(key==='ArrowDown'||key==='s'||key==='S')move2048('down')}
function move2048(dir){var moved=false;if(dir==='left'||dir==='right'){for(var r=0;r<4;r++){var row=grid2048[r].filter(function(x){return x!==0});if(dir==='right')row.reverse();for(var i=0;i<row.length-1;i++){if(row[i]===row[i+1]){row[i]*=2;score+=row[i];row.splice(i+1,1);moved=true}}if(dir==='right')row.reverse();for(var c=0;c<4;c++){if(grid2048[r][c]!==row[c]){moved=true;break}}grid2048[r]=row.concat(Array(4-row.length).fill(0))}}else if(dir==='up'||dir==='down'){for(var c=0;c<4;c++){var col=[grid2048[0][c],grid2048[1][c],grid2048[2][c],grid2048[3][c]].filter(function(x){return x!==0});if(dir==='down')col.reverse();for(var i=0;i<col.length-1;i++){if(col[i]===col[i+1]){col[i]*=2;score+=col[i];col.splice(i+1,1);moved=true}}if(dir==='down')col.reverse();for(var r=0;r<4;r++){if(grid2048[r][c]!==(col[r]||0)){moved=true;break}}for(var r=0;r<4;r++){grid2048[r][c]=col[r]||0}}if(moved){addRandomTile2048();update2048Display()}}
</script>
</body>
</html>
