<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛球 - 首页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --accent-orange: #f97316;
            --accent-green: #22c55e;
            --border-color: #30363d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
        
        /* Header */
        header {
            padding: 48px 0 32px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 48px;
        }
        .profile { display: flex; align-items: center; gap: 24px; }
        .avatar-img {
            width: 96px; height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-purple);
        }
        .profile-info h1 {
            font-size: 28px; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .profile-info p { color: var(--text-secondary); font-size: 14px; }
        .tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .tag {
            padding: 4px 12px; background: var(--bg-tertiary); border-radius: 20px;
            font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border-color);
        }
        .tag:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
        
        /* Navigation */
        nav { display: flex; gap: 32px; margin-bottom: 48px; }
        nav a {
            color: var(--text-secondary); text-decoration: none; font-size: 15px;
            position: relative; padding: 8px 0; transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: var(--text-primary); }
        nav a.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
            border-radius: 2px;
        }
        
        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 0;
        }
        .hero h2 {
            font-size: 36px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 32px;
        }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.15);
        }
        .card-icon { font-size: 40px; margin-bottom: 12px; }
        .card h3 { font-size: 18px; margin-bottom: 8px; }
        .card p { color: var(--text-secondary); font-size: 13px; }
        
        footer {
            padding: 32px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        @media (max-width: 640px) {
            .profile { flex-direction: column; text-align: center; }
            nav { justify-content: center; gap: 16px; }
            .hero h2 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="profile">
                <img src="avatar.png" alt="毛球" class="avatar-img">
                <div class="profile-info">
                    <h1>毛球</h1>
                    <p>技术爱好者 · 探索者</p>
                    <div class="tags">
                        <span class="tag">INTP</span>
                        <span class="tag">摄影</span>
                        <span class="tag">AI</span>
                        <span class="tag">编程</span>
                        <span class="tag">技术</span>
                    </div>
                </div>
            </div>
        </header>
        
        <nav>
            <a href="index.html" class="active">首页</a>
            <a href="articles.html">文章</a>
            <a href="photos.html">摄影</a>
            <a href="projects.html">项目</a>
            <a href="guestbook.html">留言板</a>
        </nav>
        
        <main>
            <div class="hero">
                <h2>欢迎来到毛球的博客</h2>
                <p>记录学习笔记、技术分享和探索发现</p>
                <p style="margin-top: 16px; font-size: 14px; color: var(--text-secondary);">本博客由泡芙（毛球的AI小助理）协助开发与撰写</p>
            </div>
            
            <div class="cards-grid">
                <a href="articles.html" class="card">
                    <div class="card-icon">📝</div>
                    <h3>文章</h3>
                    <p>技术笔记与学习心得</p>
                </a>
                <a href="photos.html" class="card">
                    <div class="card-icon">📷</div>
                    <h3>摄影</h3>
                    <p>记录美好瞬间</p>
                </a>
                <a href="projects.html" class="card">
                    <div class="card-icon">💻</div>
                    <h3>项目</h3>
                    <p>个人项目作品集</p>
                </a>
                <a href="guestbook.html" class="card">
                    <div class="card-icon">💬</div>
                    <h3>留言板</h3>
                    <p>欢迎留言交流</p>
                </a>
            </div>
        </main>
        
        <footer>
            <p>© 2026 毛球的博客 · Built with ❤️</p>
        </footer>
    </div>
</body>
</html>
